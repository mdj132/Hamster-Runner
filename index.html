<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hamster Runner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #2b1a0e; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; color: #fff; touch-action: none; }
  h1 { font-size: clamp(1rem, 4vw, 1.4rem); margin-bottom: 6px; letter-spacing: 2px; color: #f5a623; }
  #ui { display: flex; gap: clamp(12px, 4vw, 30px); margin-bottom: 6px; font-size: clamp(0.75rem, 3vw, 0.9rem); color: #aaa; }
  #ui span { color: #fff; font-weight: bold; }
  #canvasWrap { width: 100%; max-width: 700px; padding: 0 8px; }
  canvas { width: 100%; height: auto; display: block; border: 2px solid #f5a623; border-radius: 8px; }
  #msg { margin-top: 10px; font-size: clamp(0.85rem, 3.5vw, 1rem); color: #f5a623; min-height: 1.4em; text-align: center; padding: 0 12px; }
  #jumpBtn {
    margin-top: 14px;
    width: clamp(120px, 40vw, 180px);
    height: clamp(56px, 14vw, 72px);
    background: linear-gradient(145deg, #f5a623, #e08800);
    border: none; border-radius: 50px;
    color: #fff; font-size: clamp(1.4rem, 6vw, 2rem);
    font-weight: bold; cursor: pointer;
    box-shadow: 0 6px 20px rgba(245,166,35,0.45);
    user-select: none; -webkit-user-select: none;
    active-transform: scale(0.95);
  }
  #jumpBtn:active { transform: scale(0.93); box-shadow: 0 2px 10px rgba(245,166,35,0.3); }
  #hint { margin-top: 6px; font-size: clamp(0.65rem, 2.5vw, 0.78rem); color: #555; }
</style>
</head>
<body>
<h1>🐹 Hamster Runner</h1>
<div id="ui">
  <div>Punkte: <span id="scoreEl">0</span></div>
  <div>Best: <span id="hiEl">0</span></div>
  <div id="livesEl">❤️❤️❤️</div>
</div>
<div id="canvasWrap"><canvas id="c"></canvas></div>
<div id="msg">Tippe den Button oder SPACE zum Starten</div>
<button id="jumpBtn">🐹</button>
<div id="hint">Doppelsprung möglich</div>

<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');
// Internal resolution
const CW = 700, CH = 280;
c.width = CW; c.height = CH;

const scoreEl = document.getElementById('scoreEl');
const hiEl = document.getElementById('hiEl');
const livesEl = document.getElementById('livesEl');
const msgEl = document.getElementById('msg');
const jumpBtn = document.getElementById('jumpBtn');

const GROUND = CH - 55;
const GRAVITY = 0.55;
const JUMP_FORCE = -13;

let state = 'idle';
let score, hi = 0, lives, frame, speed, spawnTimer;
let p = {};

function resetPlayer() {
  p = { x: 90, y: GROUND - 36, w: 44, h: 36, vy: 0, jumps: 0, maxJumps: 2, invince: 0, run: 0 };
}

let obstacles = [], particles = [];

const cageBars = Array.from({length: 18}, (_, i) => ({x: i * 42}));
const sawdust = Array.from({length: 30}, () => ({
  x: Math.random() * CW, y: GROUND + 8 + Math.random() * 28,
  w: 8 + Math.random() * 18, h: 4 + Math.random() * 6,
  col: ['#c8a96e','#b8935a','#d4b47a','#e8c98a'][Math.floor(Math.random()*4)]
}));

function initGame() {
  score = 0; lives = 3; frame = 0; speed = 4; spawnTimer = 80;
  obstacles = []; particles = [];
  resetPlayer();
  state = 'running';
  msgEl.textContent = '';
  updateLives();
  jumpBtn.textContent = '🦘';
}

function updateLives() { livesEl.textContent = '❤️'.repeat(lives); }

function spawnObstacle() {
  const roll = Math.random();
  if (roll < 0.3) {
    obstacles.push({type:'bottle', x:CW+20, y:GROUND-70, w:28, h:70});
  } else if (roll < 0.6) {
    const h = 34 + Math.random()*20;
    obstacles.push({type:'roll', x:CW+20, y:GROUND-h, w:30, h:h});
  } else if (roll < 0.8) {
    obstacles.push({type:'pebbles', x:CW+20, y:GROUND-22, w:38, h:22});
  } else {
    obstacles.push({type:'seed', x:CW+20, y:GROUND-100-Math.random()*50, w:30, h:18, flap:0});
  }
}

function spawnParticles(x, y, color) {
  for (let i=0; i<10; i++)
    particles.push({x, y, vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5, life:35, color});
}

function jump() {
  if (state !== 'running') { initGame(); return; }
  if (p.jumps < p.maxJumps) {
    p.vy = JUMP_FORCE; p.jumps++;
    spawnParticles(p.x+p.w/2, p.y+p.h, '#f5a623');
  }
}

document.addEventListener('keydown', e => { if (e.code==='Space') { e.preventDefault(); jump(); }});
jumpBtn.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive:false});
jumpBtn.addEventListener('click', jump);
c.addEventListener('touchstart', e => { e.preventDefault(); jump(); }, {passive:false});

function drawHamster(px, py, invince, runFrame) {
  if (invince > 0 && Math.floor(invince/4)%2===0) return;
  const bodyW = 44, bodyH = 32;
  const legPhase = Math.sin(runFrame * 0.35);
  ctx.fillStyle = '#f0c080';
  ctx.beginPath(); ctx.ellipse(px-4, py+bodyH*0.6, 7, 5, -0.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f0c080';
  ctx.beginPath(); ctx.ellipse(px+bodyW/2, py+bodyH/2+2, bodyW/2, bodyH/2, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fce8c0';
  ctx.beginPath(); ctx.ellipse(px+bodyW/2+4, py+bodyH/2+5, bodyW*0.28, bodyH*0.3, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f5b87a';
  ctx.beginPath(); ctx.ellipse(px+bodyW-4, py+12, 11, 9, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f0c080';
  ctx.beginPath(); ctx.ellipse(px+bodyW-2, py+10, 20, 17, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#e8a850';
  ctx.beginPath(); ctx.ellipse(px+bodyW-2, py+2, 8, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f0c080';
  ctx.beginPath(); ctx.ellipse(px+bodyW-14, py-4, 7, 9, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(px+bodyW+8, py-5, 7, 9, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f0a0b0';
  ctx.beginPath(); ctx.ellipse(px+bodyW-14, py-4, 4, 6, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(px+bodyW+8, py-5, 4, 6, 0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a0a00';
  ctx.beginPath(); ctx.arc(px+bodyW+3, py+8, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(px+bodyW-10, py+9, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(px+bodyW+5, py+6, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(px+bodyW-8, py+7, 2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#e8607a';
  ctx.beginPath(); ctx.ellipse(px+bodyW+14, py+12, 4, 3, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 1;
  for (let i=-1; i<=1; i+=2) {
    ctx.beginPath(); ctx.moveTo(px+bodyW+14, py+13); ctx.lineTo(px+bodyW+30, py+12+i*4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px+bodyW+14, py+13); ctx.lineTo(px+bodyW+30, py+15+i*3); ctx.stroke();
  }
  ctx.fillStyle = '#e8a850';
  ctx.beginPath(); ctx.ellipse(px+bodyW-8, py+bodyH+5+legPhase*4, 6, 7, 0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(px+bodyW-20, py+bodyH+5-legPhase*4, 6, 7, -0.2, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f0c080';
  ctx.beginPath(); ctx.ellipse(px+10, py+bodyH+4+legPhase*3, 7, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(px+22, py+bodyH+4-legPhase*3, 7, 6, 0, 0, Math.PI*2); ctx.fill();
}

function drawObstacle(o) {
  if (o.type === 'bottle') {
    ctx.fillStyle = '#a8d8ea';
    ctx.beginPath(); ctx.roundRect(o.x, o.y+12, o.w, o.h-12, 4); ctx.fill();
    ctx.fillStyle = '#78bcd4'; ctx.fillRect(o.x+4, o.y+20, o.w-8, o.h-30);
    ctx.fillStyle = '#e74c3c'; ctx.beginPath(); ctx.roundRect(o.x+4, o.y, o.w-8, 16, 3); ctx.fill();
    ctx.fillStyle = 'rgba(100,180,220,0.4)'; ctx.fillRect(o.x+4, o.y+30, o.w-8, o.h-42);
    ctx.fillStyle='#fff'; ctx.font='8px sans-serif'; ctx.textAlign='center';
    ctx.fillText('H₂O', o.x+o.w/2, o.y+o.h*0.55);
  } else if (o.type === 'roll') {
    ctx.fillStyle = '#f5f0e8'; ctx.beginPath(); ctx.roundRect(o.x, o.y, o.w, o.h, 5); ctx.fill();
    ctx.strokeStyle = '#ddd'; ctx.lineWidth=1;
    for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(o.x,o.y+i*o.h/4);ctx.lineTo(o.x+o.w,o.y+i*o.h/4);ctx.stroke();}
    ctx.fillStyle='#c8b89a'; ctx.beginPath(); ctx.ellipse(o.x+o.w/2,o.y+o.h/2,8,8,0,0,Math.PI*2); ctx.fill();
  } else if (o.type === 'pebbles') {
    const cols=['#8e8e8e','#a0a0a0','#707070','#b0b0b0'];
    [{x:0,y:8,r:9},{x:14,y:2,r:10},{x:28,y:6,r:9},{x:6,y:14,r:7},{x:20,y:13,r:8}].forEach((pb,i)=>{
      ctx.fillStyle=cols[i%cols.length];
      ctx.beginPath(); ctx.ellipse(o.x+pb.x+pb.r/2,o.y+pb.y,pb.r,pb.r*0.75,0,0,Math.PI*2); ctx.fill();
    });
  } else if (o.type === 'seed') {
    o.flap=(o.flap||0)+0.18;
    const bob=Math.sin(o.flap)*5;
    ctx.fillStyle='#5ab245';
    ctx.beginPath(); ctx.ellipse(o.x+o.w/2-12,o.y+bob+o.h/2,14,7,-0.4,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(o.x+o.w/2+12,o.y+bob+o.h/2,14,7,0.4,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3a2a0a'; ctx.beginPath(); ctx.ellipse(o.x+o.w/2,o.y+bob+o.h/2,8,11,0.2,0,Math.PI*2); ctx.fill();
    o.y+=Math.sin(o.flap)*0.5;
  }
}

function drawBackground() {
  const wallGrad=ctx.createLinearGradient(0,0,0,GROUND);
  wallGrad.addColorStop(0,'#f5e6c8'); wallGrad.addColorStop(1,'#e8d4a8');
  ctx.fillStyle=wallGrad; ctx.fillRect(0,0,CW,GROUND);
  ctx.strokeStyle='rgba(150,150,180,0.25)'; ctx.lineWidth=3;
  cageBars.forEach(bar=>{
    const bx=(bar.x-frame*speed*0.05+CW*4)%CW;
    ctx.beginPath(); ctx.moveTo(bx,0); ctx.lineTo(bx,GROUND); ctx.stroke();
  });
  ctx.strokeStyle='rgba(150,150,180,0.15)'; ctx.lineWidth=2;
  [40,120,200].forEach(y=>{ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();});
  const wx=CW-120, wy=GROUND-80;
  ctx.strokeStyle='rgba(180,120,60,0.3)'; ctx.lineWidth=6;
  ctx.beginPath(); ctx.arc(wx,wy,60,0,Math.PI*2); ctx.stroke();
  ctx.lineWidth=3;
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2+frame*0.03;
    ctx.beginPath(); ctx.moveTo(wx,wy); ctx.lineTo(wx+Math.cos(a)*58,wy+Math.sin(a)*58); ctx.stroke();
  }
  ctx.fillStyle='rgba(180,120,60,0.3)'; ctx.beginPath(); ctx.arc(wx,wy,8,0,Math.PI*2); ctx.fill();
  const sawGrad=ctx.createLinearGradient(0,GROUND,0,CH);
  sawGrad.addColorStop(0,'#c8a96e'); sawGrad.addColorStop(1,'#a07840');
  ctx.fillStyle=sawGrad; ctx.fillRect(0,GROUND,CW,CH-GROUND);
  sawdust.forEach(s=>{
    const sx=(s.x-frame*speed*0.6+CW*10)%CW;
    ctx.fillStyle=s.col; ctx.beginPath(); ctx.ellipse(sx,s.y,s.w/2,s.h/2,0.4,0,Math.PI*2); ctx.fill();
  });
  ctx.strokeStyle='#b08040'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,GROUND); ctx.lineTo(CW,GROUND); ctx.stroke();
}

function drawParticles() {
  particles.forEach(pt=>{
    ctx.globalAlpha=pt.life/35; ctx.fillStyle=pt.color;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,4,0,Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha=1;
}

function collides(a,b){
  const m=8;
  return a.x+m<b.x+b.w&&a.x+a.w-m>b.x&&a.y+m<b.y+b.h&&a.y+a.h-m>b.y;
}

function update() {
  if(state!=='running') return;
  frame++; score=Math.floor(frame/6);
  scoreEl.textContent=score;
  if(score>hi){hi=score;hiEl.textContent=hi;}
  speed=4+Math.floor(score/120)*0.4;
  p.vy+=GRAVITY; p.y+=p.vy;
  if(p.y>=GROUND-p.h){p.y=GROUND-p.h;p.vy=0;p.jumps=0;}
  if(p.invince>0) p.invince--;
  p.run++;
  spawnTimer--;
  if(spawnTimer<=0){spawnObstacle();spawnTimer=65+Math.random()*55-Math.min(score/12,25);}
  obstacles.forEach(o=>o.x-=speed);
  obstacles=obstacles.filter(o=>o.x>-120);
  particles.forEach(pt=>{pt.x+=pt.vx;pt.y+=pt.vy;pt.life--;});
  particles=particles.filter(pt=>pt.life>0);
  if(p.invince===0){
    for(let o of obstacles){
      if(collides({x:p.x,y:p.y,w:p.w,h:p.h},o)){
        spawnParticles(p.x+p.w/2,p.y+p.h/2,'#f5a623');
        lives--; updateLives(); p.invince=90;
        if(lives<=0){
          state='gameover';
          jumpBtn.textContent='🐹';
          msgEl.textContent='💀 Game Over! '+score+' Punkte – Nochmal?';
        }
        break;
      }
    }
  }
}

function draw() {
  ctx.clearRect(0,0,CW,CH);
  drawBackground();
  obstacles.forEach(drawObstacle);
  drawHamster(p.x,p.y,p.invince,p.run);
  drawParticles();
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath(); ctx.roundRect(CW/2-55,8,110,28,6); ctx.fill();
  ctx.fillStyle='#f5a623'; ctx.font='bold 15px Segoe UI'; ctx.textAlign='center';
  ctx.fillText('🌻 '+score+' Punkte',CW/2,28); ctx.textAlign='left';
  if(state==='idle'){
    ctx.fillStyle='rgba(0,0,0,0.45)'; ctx.fillRect(0,0,CW,CH);
    ctx.fillStyle='#f5a623'; ctx.font='bold 30px Segoe UI'; ctx.textAlign='center';
    ctx.fillText('🐹 HAMSTER RUNNER',CW/2,CH/2-22);
    ctx.fillStyle='#fff'; ctx.font='16px Segoe UI';
    ctx.fillText('Tippe zum Starten',CW/2,CH/2+16);
    ctx.textAlign='left';
  }
}

(function loop(){update();draw();requestAnimationFrame(loop);})();
</script>
</body>
</html>
